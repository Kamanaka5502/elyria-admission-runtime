services:
  elyria-consequence-twin:
    build: .
    ports:
      - "8080:8080"
    environment:
      ELYRIA_DB_PATH: /data/elyria.db
    volumes:
      - elyria_data:/data
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8080/healthz')"]
      interval: 15s
      timeout: 5s
      retries: 5
volumes:
  elyria_data:
